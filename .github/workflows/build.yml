name: Build and Release War3Trainer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore Packages
      run: nuget restore War3Trainer.sln

    - name: Build Solution
      run: msbuild War3Trainer.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Create ZIP Archive
      shell: powershell
      run: |
        $releaseDir = Join-Path $PWD 'War3Trainer\bin\Release'
        if (-not (Test-Path $releaseDir)) {
          throw "Release output not found: $releaseDir"
        }
        if (Test-Path .\War3Trainer-Release.zip) {
          Remove-Item .\War3Trainer-Release.zip -Force
        }
        Compress-Archive -Path (Join-Path $releaseDir '*') -DestinationPath .\War3Trainer-Release.zip -Force
        Get-Item .\War3Trainer-Release.zip

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: War3Trainer-Release
        path: War3Trainer-Release.zip
        if-no-files-found: error

    - name: Publish to GitHub Releases
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: War3Trainer-Release.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
