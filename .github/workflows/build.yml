name: Build and Release War3Trainer

on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v2

    - name: Restore Packages
      run: nuget restore War3Trainer.sln

    - name: Build Solution
      run: msbuild War3Trainer.sln /p:Configuration=Release /p:Platform="Any CPU"

    - name: Create ZIP Archive
      run: Compress-Archive -Path War3Trainer\bin\Release\* -DestinationPath War3Trainer-Release.zip

    - name: Publish to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: War3Trainer-Release.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
